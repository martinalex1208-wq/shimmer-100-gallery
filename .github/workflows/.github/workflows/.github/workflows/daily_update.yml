name: Daily MicroLight Update

on:
  schedule:
    # 每天 UTC 00:00 → 台灣時間早上 8:00 (CST = UTC+8)
    - cron: '0 0 * * *'
  
  # 允許手動觸發（方便測試）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 讓 git commit 可以正常運作

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 或 3.12 都可以

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests

      - name: Run daily generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      # ───────────────────────────────────────────────
      # 重要：假設你把 main.py 裡的圖片儲存與檔名邏輯改成帶日期
      # ───────────────────────────────────────────────

      - name: Configure git user
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Commit and push changes
        run: |
          git add index.html *.jpg *.png || true
          git commit -m "Daily update: $(date +%Y-%m-%d) - auto generated glimmers" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
